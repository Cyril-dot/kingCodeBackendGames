spring.application.name=KikiWebSite

# ============================================================
# DATABASE (FROM ENV FILE)
# ============================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# ============================================================
# JWT (FROM ENV)
# ============================================================
jwt.secret=${JWT_SECRET}
security.token.encryption-key=${TOKEN_ENCRYPTION_KEY}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:432000000}
jwt.access.admin-expiration-ms=${JWT_ADMIN_ACCESS_EXPIRATION_MS:432000000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:432000000}

# ============================================================
# PAYSTACK (FROM ENV)
# ============================================================
app.paystack.secret-key=${PAYSTACK_SECRET_KEY}
app.paystack.base-url=https://api.paystack.co
app.paystack.callback-url=${PAYSTACK_CALLBACK_URL}

# ============================================================
# BUSINESS RULES
# ============================================================
app.rules.min-deposit=500
app.rules.min-withdraw-balance=5000
app.rules.withdrawal-fee-percent=10
app.rules.min-bet-stake=5

# ============================================================
# SERVER (FROM ENV)
# ============================================================
server.port=${PORT:8080}

# ============================================================
# LOGGING
# ============================================================
logging.level.com.kikiBettingWebBack.KikiWebSite=INFO
logging.level.org.springframework.security=WARN

football.api.key=${FD_API_KEY}
football.api.base-url=https://api.football-data.org/v4

worldcup.json.url=https://raw.githubusercontent.com/openfootball/worldcup.json/master/2022/worldcup.json
logging.level.com.gstake=INFO